<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="64" y1="32" x2="448" y2="480" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111620" />
      <stop offset="1" stop-color="#05070B" />
    </linearGradient>
    <linearGradient id="blue" x1="112" y1="92" x2="400" y2="370" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" />
      <stop offset="0.5" stop-color="#2563EB" />
      <stop offset="1" stop-color="#1D4ED8" />
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feColorMatrix
        in="blur"
        type="matrix"
        values="0 0 0 0 0.15 0 0 0 0 0.39 0 0 0 0 0.92 0 0 0 0.85 0"
      />
      <feBlend in="SourceGraphic" />
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)" />
  <circle cx="256" cy="218" r="142" fill="none" stroke="#1F2937" stroke-width="34" />
  <circle
    cx="256"
    cy="218"
    r="142"
    fill="none"
    stroke="url(#blue)"
    stroke-linecap="round"
    stroke-width="34"
    filter="url(#glow)"
  />

  <text
    x="256"
    y="272"
    fill="#F8FBFF"
    font-family="Inter, Arial, sans-serif"
    font-size="158"
    font-weight="900"
    text-anchor="middle"
  >
    M
  </text>

  <text
    x="256"
    y="452"
    fill="#E5F9F6"
    font-family="Inter, Arial, sans-serif"
    font-size="52"
    font-weight="800"
    letter-spacing="6"
    text-anchor="middle"
  >
    MIAOYO
  </text>
</svg>
